<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=320, initial-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>dashipod</title>
  <style>
    * {
      margin: 0; padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 320px; height: 480px;
      overflow: hidden;
      background: #1c1c1e;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    }

    /* ── iPod body ─────────────────────────────────── */
    .ipod {
      width: 238px; height: 400px;
      background: -webkit-linear-gradient(170deg, #f2f2f2 0%, #e0e0e0 50%, #d4d4d4 100%);
      background:         linear-gradient(170deg, #f2f2f2 0%, #e0e0e0 50%, #d4d4d4 100%);
      border-radius: 22px;
      box-shadow:
        0 0 0 1px #b4b4b4,
        inset 0 1px 0 rgba(255,255,255,0.7),
        0 14px 44px rgba(0,0,0,0.65);
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      padding: 14px 15px 16px;
    }

    /* ── Screen bezel ──────────────────────────────── */
    .bezel {
      width: 208px; height: 150px;
      background: #111;
      border-radius: 5px;
      padding: 6px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), 0 1px 0 rgba(255,255,255,0.25);
      -webkit-flex-shrink: 0; flex-shrink: 0;
      margin-bottom: 8px;
    }

    .screen {
      width: 100%; height: 100%;
      background: #e8e8e4;
      border-radius: 2px;
      overflow: hidden;
    }

    /* ── Status bar ────────────────────────────────── */
    .status-bar {
      height: 16px;
      background: #4a79c4;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: justify; -webkit-justify-content: space-between; justify-content: space-between;
      padding: 0 5px;
    }

    .status-bar span {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8px; font-weight: bold;
      color: #fff; letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* ── Screen views ──────────────────────────────── */
    .view {
      display: none;
      height: calc(100% - 16px);
    }
    .view.active { display: block; }

    /* ── Calendar ──────────────────────────────────── */
    .cal-wrap { padding: 3px 2px 0; }

    .cal-month {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 9px; font-weight: bold; color: #333;
      text-align: center; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 2px;
    }

    .cal-grid {
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-flex-wrap: wrap; flex-wrap: wrap;
    }

    .cal-cell {
      width: 14.2857%; text-align: center;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8px; color: #333;
      height: 14px; line-height: 14px;
    }

    .cal-cell.hdr  { font-size: 7px; font-weight: bold; color: #999; }
    .cal-cell.wknd { color: #999; }
    .cal-cell.today {
      background: #4a79c4; color: #fff; border-radius: 2px;
    }
    .cal-cell.today.wknd { color: #fff; }

    /* ── Weather ───────────────────────────────────── */
    .wx-wrap {
      height: 100%;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    }

    .wx-city {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 7px; color: #777; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 2px;
      text-align: center; padding: 0 4px;
    }

    .wx-temp {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 54px; font-weight: 100; color: #222;
      line-height: 1; margin-bottom: 2px;
    }

    .wx-cond {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 7px; color: #777; text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Date & Time ───────────────────────────────── */
    .dt-wrap {
      height: 100%;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
    }

    .dt-date {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8px; color: #999;
      text-transform: uppercase; letter-spacing: 2px; margin-bottom: 2px;
    }

    .dt-time {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 48px; font-weight: 100; color: #222;
      line-height: 1; letter-spacing: -1px;
    }

    .dt-day {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 8px; color: #999;
      text-transform: uppercase; letter-spacing: 3px; margin-top: 4px;
    }

    /* ── Settings ──────────────────────────────────── */
    .set-wrap {
      height: 100%;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      padding: 0 10px;
    }

    .set-slot {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 7px; color: #999; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 4px;
    }

    .set-city {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 11px; font-weight: bold; color: #222;
      text-align: center; margin-bottom: 10px; line-height: 1.3;
    }

    .set-hint {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 7px; color: #bbb; letter-spacing: 0.3px; margin-top: 3px;
      text-align: center;
    }

    /* ── Apple logo area ───────────────────────────── */
    .apple-area {
      height: 18px; -webkit-flex-shrink: 0; flex-shrink: 0;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      margin-bottom: 8px;
    }

    .apple-logo { font-size: 12px; color: #c0c0c0; line-height: 1; }

    /* ── Clickwheel ────────────────────────────────── */
    .wheel-wrap {
      width: 176px; height: 176px;
      position: relative;
      -webkit-flex-shrink: 0; flex-shrink: 0;
    }

    .wheel {
      width: 176px; height: 176px;
      border-radius: 50%;
      background: -webkit-radial-gradient(38% 33%, circle, #ebebeb 0%, #d8d8d8 50%, #c8c8c8 100%);
      background:         radial-gradient(circle at 38% 33%, #ebebeb 0%, #d8d8d8 50%, #c8c8c8 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.10),
        0 3px 8px rgba(0,0,0,0.18),
        inset 0 1px 2px rgba(255,255,255,0.85);
      position: relative;
      -webkit-user-select: none; user-select: none;
    }

    .wlabel {
      position: absolute;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 7px; font-weight: bold; color: #555; letter-spacing: 0.3px;
    }

    .wlabel.top    { top: 13px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%); }
    .wlabel.right  { right: 13px; top: 50%; -webkit-transform: translateY(-50%); transform: translateY(-50%); }
    .wlabel.bottom { bottom: 13px; left: 50%; -webkit-transform: translateX(-50%); transform: translateX(-50%); }
    .wlabel.left   { left: 13px; top: 50%; -webkit-transform: translateY(-50%); transform: translateY(-50%); }

    .center-btn {
      position: absolute;
      width: 58px; height: 58px;
      border-radius: 50%;
      background: -webkit-radial-gradient(38% 33%, circle, #f2f2f2 0%, #e0e0e0 60%, #d4d4d4 100%);
      background:         radial-gradient(circle at 38% 33%, #f2f2f2 0%, #e0e0e0 60%, #d4d4d4 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.08),
        0 2px 4px rgba(0,0,0,0.14),
        inset 0 1px 1px rgba(255,255,255,0.9);
      top: 50%; left: 50%;
      -webkit-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .center-btn.pressed { background: -webkit-radial-gradient(38% 33%, circle, #ddd 0%, #ccc 60%); }
  </style>
</head>
<body>

<div class="ipod">

  <!-- Screen -->
  <div class="bezel">
    <div class="screen">

      <div class="status-bar">
        <span id="sb-title">CALENDARIO</span>
        <span id="sb-right">1/4</span>
      </div>

      <!-- 0: Calendar -->
      <div class="view active" id="view-0">
        <div class="cal-wrap">
          <div class="cal-month" id="cal-month"></div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

      <!-- 1: Weather city 1 -->
      <div class="view" id="view-1">
        <div class="wx-wrap">
          <div class="wx-city" id="wx1-city">SAN MATEO ATENCO</div>
          <div class="wx-temp" id="wx1-temp">--&deg;</div>
          <div class="wx-cond" id="wx1-cond">CARGANDO</div>
        </div>
      </div>

      <!-- 2: Weather city 2 -->
      <div class="view" id="view-2">
        <div class="wx-wrap">
          <div class="wx-city" id="wx2-city">CD. OBREGON</div>
          <div class="wx-temp" id="wx2-temp">--&deg;</div>
          <div class="wx-cond" id="wx2-cond">CARGANDO</div>
        </div>
      </div>

      <!-- 3: Date & Time -->
      <div class="view" id="view-3">
        <div class="dt-wrap">
          <div class="dt-date" id="dt-date">--/--/----</div>
          <div class="dt-time" id="dt-time">--:--</div>
          <div class="dt-day"  id="dt-day">---</div>
        </div>
      </div>

      <!-- 4: Settings -->
      <div class="view" id="view-4">
        <div class="set-wrap">
          <div class="set-slot" id="set-label">CIUDAD 1</div>
          <div class="set-city" id="set-city">SAN MATEO ATENCO</div>
          <div class="set-hint">◀◀  ▶▶ para cambiar</div>
          <div class="set-hint">● guardar &nbsp;·&nbsp; MENU cancelar</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Apple logo -->
  <div class="apple-area"><span class="apple-logo">&#xF8FF;</span></div>

  <!-- Clickwheel -->
  <div class="wheel-wrap">
    <div class="wheel" id="wheel">
      <span class="wlabel top">MENU</span>
      <span class="wlabel right">&#9658;&#9658;</span>
      <span class="wlabel bottom">&#9658;II</span>
      <span class="wlabel left">&#9668;&#9668;</span>
      <div class="center-btn" id="center-btn"></div>
    </div>
  </div>

</div>

<script>
// ── CITIES ────────────────────────────────────────────────
var CITIES = [
  { name: 'SAN MATEO ATENCO', lat: 19.264,  lon: -99.540  },
  { name: 'CD. OBREGON',      lat: 27.482,  lon: -109.930 },
  { name: 'CIUDAD DE MEXICO', lat: 19.4326, lon: -99.1332 },
  { name: 'GUADALAJARA',      lat: 20.6597, lon: -103.3496 },
  { name: 'MONTERREY',        lat: 25.6866, lon: -100.3161 },
  { name: 'CANCUN',           lat: 21.1619, lon: -86.8515  },
  { name: 'TIJUANA',          lat: 32.5149, lon: -117.0382 },
  { name: 'TOLUCA',           lat: 19.2826, lon: -99.6557  },
  { name: 'PUEBLA',           lat: 19.0414, lon: -98.2063  },
  { name: 'MERIDA',           lat: 20.9674, lon: -89.5926  }
];

// ── STATE ─────────────────────────────────────────────────
var city1Idx   = 0; // San Mateo Atenco
var city2Idx   = 1; // Ciudad Obregon
var curView    = 0;
var MAX_VIEWS  = 4;
var inSettings = false;
var setSlot    = 1;
var setIdx     = 0;

// ── CONSTANTS ─────────────────────────────────────────────
var VIEW_NAMES = ['CALENDARIO', 'CLIMA', 'CLIMA', 'HORA'];

var MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
              'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
var DAYS   = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'];
var HDRS   = ['L','M','X','J','V','S','D'];

var WMO = {
  0:'DESPEJADO', 1:'CASI DESPEJADO', 2:'PARCIAL NUBLADO', 3:'NUBLADO',
  45:'NIEBLA', 48:'NIEBLA',
  51:'LLOVIZNA', 53:'LLOVIZNA', 55:'LLOVIZNA',
  61:'LLUVIA', 63:'LLUVIA', 65:'LLUVIA INTENSA',
  71:'NIEVE', 73:'NIEVE', 75:'NIEVE INTENSA',
  80:'CHUBASCOS', 81:'CHUBASCOS', 82:'CHUBASCOS',
  95:'TORMENTA', 96:'TORMENTA', 99:'TORMENTA'
};

var ROT_THRESHOLD = 28; // degrees per step

// ── HELPERS ───────────────────────────────────────────────
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function el(id) { return document.getElementById(id); }

// ── CALENDAR ─────────────────────────────────────────────
function renderCalendar() {
  var now  = new Date();
  var yr   = now.getFullYear();
  var mo   = now.getMonth();
  var tod  = now.getDate();
  var dInM = new Date(yr, mo + 1, 0).getDate();
  var fd   = new Date(yr, mo, 1).getDay();
  var off  = (fd === 0) ? 6 : fd - 1;
  var html = '', i, d, col, cls;

  el('cal-month').innerHTML = MONTHS[mo] + ' ' + yr;

  for (i = 0; i < 7; i++) html += '<div class="cal-cell hdr">' + HDRS[i] + '</div>';
  for (i = 0; i < off; i++) html += '<div class="cal-cell"></div>';
  for (d = 1; d <= dInM; d++) {
    col = (off + d - 1) % 7;
    cls = 'cal-cell';
    if (d === tod)        cls += ' today';
    if (col === 5 || col === 6) cls += ' wknd';
    html += '<div class="' + cls + '">' + d + '</div>';
  }
  el('cal-grid').innerHTML = html;
}

// ── DATE/TIME ─────────────────────────────────────────────
function updateDateTime() {
  var now = new Date();
  el('dt-time').innerHTML = pad(now.getHours()) + ':' + pad(now.getMinutes());
  el('dt-date').innerHTML = pad(now.getDate()) + '/' + pad(now.getMonth() + 1) + '/' + now.getFullYear();
  el('dt-day').innerHTML  = DAYS[now.getDay()];
  // also update status bar time when on any view
  if (!inSettings) el('sb-right').innerHTML = (curView + 1) + '/4';
}

// ── WEATHER ───────────────────────────────────────────────
function fetchWeather(slot) {
  var idx  = (slot === 1) ? city1Idx : city2Idx;
  var city = CITIES[idx];
  var url  = 'https://api.open-meteo.com/v1/forecast?latitude=' + city.lat +
             '&longitude=' + city.lon + '&current_weather=true';
  var xhr  = new XMLHttpRequest();
  xhr.open('GET', url, true);
  xhr.onreadystatechange = function () {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      try {
        var cw   = JSON.parse(xhr.responseText).current_weather;
        var temp = Math.round(cw.temperature);
        el('wx' + slot + '-temp').innerHTML = temp + '\u00B0';
        el('wx' + slot + '-cond').innerHTML = WMO[cw.weathercode] || 'CLIMA';
      } catch (e) {
        el('wx' + slot + '-cond').innerHTML = 'ERROR';
      }
    } else {
      el('wx' + slot + '-cond').innerHTML = 'SIN CONEXION';
    }
  };
  xhr.send();
}

function refreshCityNames() {
  el('wx1-city').innerHTML = CITIES[city1Idx].name;
  el('wx2-city').innerHTML = CITIES[city2Idx].name;
}

// ── VIEW SWITCHING ────────────────────────────────────────
function showView(n) {
  var views = document.querySelectorAll('.view');
  var i;
  for (i = 0; i < views.length; i++) views[i].className = 'view';
  el('view-' + n).className = 'view active';
  if (n < MAX_VIEWS) {
    el('sb-title').innerHTML = VIEW_NAMES[n];
    el('sb-right').innerHTML = (n + 1) + '/4';
  }
}

function step(dir) {
  if (inSettings) {
    setIdx = (setIdx + dir + CITIES.length) % CITIES.length;
    el('set-city').innerHTML = CITIES[setIdx].name;
    return;
  }
  curView = (curView + dir + MAX_VIEWS) % MAX_VIEWS;
  showView(curView);
}

// ── SETTINGS ─────────────────────────────────────────────
function openSettings(slot) {
  inSettings = true;
  setSlot    = slot;
  setIdx     = (slot === 1) ? city1Idx : city2Idx;
  el('set-label').innerHTML = 'CIUDAD ' + slot;
  el('set-city').innerHTML  = CITIES[setIdx].name;
  el('sb-title').innerHTML  = 'AJUSTES';
  el('sb-right').innerHTML  = '\u25CF=OK';
  showView(4);
  // override class since showView skips 4 from name logic
  el('sb-title').innerHTML = 'AJUSTES';
  el('sb-right').innerHTML = '\u25CF=OK';
}

function saveSettings() {
  if (setSlot === 1) { city1Idx = setIdx; fetchWeather(1); }
  else               { city2Idx = setIdx; fetchWeather(2); }
  refreshCityNames();
  closeSettings();
}

function closeSettings() {
  inSettings = false;
  curView    = setSlot; // slot 1 → view 1, slot 2 → view 2
  showView(curView);
}

// ── CLICKWHEEL TOUCH ──────────────────────────────────────
var wheelEl   = el('wheel');
var touching  = false;
var moved     = false;
var lastAngle = 0;
var accAngle  = 0;
var sx = 0, sy = 0;

function wheelCenter() {
  var r = wheelEl.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2, r: r.width / 2 };
}

function angle(t, c) {
  return Math.atan2(t.clientY - c.y, t.clientX - c.x) * 180 / Math.PI;
}

function dist(t, c) {
  var dx = t.clientX - c.x, dy = t.clientY - c.y;
  return Math.sqrt(dx*dx + dy*dy);
}

function tapZone(t, c) {
  var d = dist(t, c);
  if (d > c.r) return null;
  if (d <= 29)  return 'center';
  var a = angle(t, c);
  if (a >= -135 && a < -45) return 'menu';
  if (a >= -45  && a < 45)  return 'fwd';
  if (a >= 45   && a < 135) return 'play';
  return 'rew';
}

wheelEl.addEventListener('touchstart', function (e) {
  var t = e.touches[0], c = wheelCenter();
  if (dist(t, c) > c.r) return;
  touching  = true; moved = false;
  sx = t.clientX; sy = t.clientY;
  lastAngle = angle(t, c); accAngle = 0;
  e.preventDefault();
}, false);

wheelEl.addEventListener('touchmove', function (e) {
  if (!touching) return;
  var t = e.touches[0], c = wheelCenter();
  var dx = t.clientX - sx, dy = t.clientY - sy;
  if (Math.sqrt(dx*dx + dy*dy) > 6) moved = true;
  if (dist(t, c) < 29) { e.preventDefault(); return; }
  var a = angle(t, c);
  var d = a - lastAngle;
  if (d > 180) d -= 360; if (d < -180) d += 360;
  accAngle += d; lastAngle = a;
  if (accAngle >=  ROT_THRESHOLD) { step(1);  accAngle = 0; }
  if (accAngle <= -ROT_THRESHOLD) { step(-1); accAngle = 0; }
  e.preventDefault();
}, false);

wheelEl.addEventListener('touchend', function (e) {
  if (!touching) return;
  touching = false;
  if (moved) return;
  var t = e.changedTouches[0], c = wheelCenter();
  var zone = tapZone(t, c);
  if      (zone === 'center') { if (inSettings) saveSettings(); }
  else if (zone === 'menu')   {
    if (inSettings) { closeSettings(); }
    else if (curView === 1) { openSettings(1); }
    else if (curView === 2) { openSettings(2); }
    else { curView = 0; showView(0); }
  }
  else if (zone === 'fwd')  { step(1);  }
  else if (zone === 'rew')  { step(-1); }
  e.preventDefault();
}, false);

// ── INIT ─────────────────────────────────────────────────
renderCalendar();
updateDateTime();
refreshCityNames();
fetchWeather(1);
fetchWeather(2);

setInterval(updateDateTime, 1000);
setInterval(function () { fetchWeather(1); }, 600000);
setInterval(function () { fetchWeather(2); }, 600000);
</script>
</body>
</html>
